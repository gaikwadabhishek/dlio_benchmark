model:
  name: aistore_cosmoflow_production
  type: cosmoflow

framework: pytorch

workflow:
  generate_data: True
  train: True
  checkpoint: False
  evaluation: True

dataset:
  data_folder: ais://dlio-cosmoflow-prod
  format: npz
  num_files_train: 4096      # Cosmology simulation data
  num_files_eval: 512
  num_samples_per_file: 1
  record_length_bytes: 67108864  # 64MB per NPZ
  record_length_bytes_stdev: 0
  num_subfolders_train: 64
  num_subfolders_eval: 8

storage:
  storage_type: aistore
  storage_root: dlio-cosmoflow-prod
  storage_options:
    endpoint_url: https://asr.ord.oci.aistore.nvidia.com:51080
    skip_verify: true

reader:
  data_loader: pytorch
  batch_size: 32
  batch_size_eval: 32
  read_threads: 16
  file_shuffle: seed
  sample_shuffle: seed
  prefetch_size: 6

train:
  epochs: 50
  computation_time: 0.3

evaluation:
  eval_time: 0.15
  epochs_between_evals: 5

metric:
  au: 0.90
